<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="stylesheet.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div style="display:flex; justify-content:flex-end; gap:8px; align-items:center; margin-bottom:8px;">
        <button type="button" class="btn btn-secondary" data-theme-toggle>🌙</button>
        <select id="langSelect">
          <option value="ru">RU</option>
          <option value="pl">PL</option>
          <option value="ka">GE</option>
          <option value="ro">RO</option>
        </select>
      </div>

      <h1 data-i18n="login.title">Вход</h1>
      <p class="muted" data-i18n="login.subtitle">Введите пароль, чтобы перейти к скриптам.</p>

      <form id="loginForm" class="form">
        <label class="label" for="password" data-i18n="login.passwordLabel">Пароль</label>
        <input id="password" class="input" type="password" placeholder="Введите пароль" required />
        <button class="btn" type="submit" data-i18n="login.button">Войти</button>
        <p id="loginError" class="error"></p>
      </form>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
